[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=logs/test-results/junit.xml
    --junit-prefix=stonks
    -p no:cacheprovider
markers =
    integration: marks tests that hit external services (Alpaca, data bus) — skipped in CI by default
