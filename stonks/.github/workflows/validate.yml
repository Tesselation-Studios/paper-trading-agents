name: Validate Configs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML configs
        run: |
          python3 -c "
          import yaml, os, sys
          errors = []
          for root, dirs, files in os.walk('traders'):
              for f in files:
                  if f.endswith(('.yaml', '.yml')):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              yaml.safe_load(fh)
                      except yaml.YAMLError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('\\n'.join(errors))
              sys.exit(1)
          print('All YAML configs valid.')
          "

      - name: Validate markdown files exist
        run: |
          python3 -c "
          import os, sys
          required_files = ['AGENTS.md', 'HEARTBEAT.md', 'SOUL.md', 'MEMORY.md', 'config.yaml']
          errors = []
          for trader in ['kairos', 'aldridge', 'stonks']:
              for rf in required_files:
                  path = f'traders/{trader}/{rf}'
                  if not os.path.exists(path):
                      errors.append(f'Missing: {path}')
          if errors:
              print('\\n'.join(errors))
              sys.exit(1)
          print('All required files present for all traders.')
          "
