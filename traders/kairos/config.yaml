name: Zara Chen
firm: Kairos Capital
strategy: momentum

model:
  primary: openrouter/deepseek/deepseek-v4-flash
  fallback: openrouter/deepseek/deepseek-v4-pro
  fallback_requirement: "portfolio > $11,000 OR 3+ consecutive positive P&L days"

risk:
  max_position_pct: 0.15          # Increased from 0.08 for small portfolio
  small_portfolio_override: 0.20  # 20% cap when portfolio < $10K
  max_exposure_pct: 1.00
  stop_loss_pct: 0.05
  max_daily_loss: 300
  cash_reserve: 2000
  min_shares_per_position: 1      # Reduced from 3 — 1 share is better than 0
  max_share_price_target: 300     # Increased from $200 — opens more tickers

signals:
  xgboost_weight: 0.50            # NEW — XGBoost gets 50% weight in conviction
  momentum_weight: 0.25           # Reduced from 0.40
  sentiment_weight: 0.15          # Reduced from 0.30
  regime_weight: 0.10             # Reduced from 0.30
  minimum_confidence: 0.55        # Reduced from 0.65 — lower bar for small portfolio
  confirmations_required: 2       # Reduced from 3 — 2/4 is enough now

hmm_regime:
  sustainable:
    entry: full
    confidence_threshold: 0.75
    half_size_threshold: 0.50
  choppy:
    entry: half
    confirmations_required: 2     # Reduced from 3 — CHOPPY doesn't mean zero
    max_position_pct: 0.05        # Increased from 0.03
  exhausted:
    entry: blocked
  fallback: "use technicals — do not halt"

xgboost:
  enabled: true                   # NEW — XGBoost integration
  conviction_threshold: 0.55      # Minimum conviction for entry
  strong_conviction: 0.65         # Counts as 2 confirmations
  max_tickers_per_heartbeat: 5    # Don't overwhelm the data bus

options:
  enabled: false
  enable_at_portfolio: 11000
  max_exposure_pct: 0.10
  max_stop_loss_pct: 0.25

exit_rules:
  profit_target_pct: 0.15
  flash_profit_target_pct: 0.10
  max_hold_days: 7
  stale_days: 5